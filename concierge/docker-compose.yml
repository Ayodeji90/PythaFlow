services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: concierge
      POSTGRES_DB: concierge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concierge"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: .
    env_file:
      # Optional: a fresh checkout has no .env (it's gitignored). The compose
      # environment below still supplies the infra URLs; .env just adds secrets.
      - path: .env
        required: false
    environment:
      # Override the host-oriented defaults so the container reaches the
      # sibling services by their compose names.
      DATABASE_URL: postgresql+asyncpg://concierge:concierge@db:5432/concierge
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
