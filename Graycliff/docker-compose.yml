services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # AI provider selection — see .env.example. All optional; without
      # keys the voice/marketing modules use rule-based fallbacks.
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL_FAST=${LLM_MODEL_FAST:-}
      - LLM_MODEL_QUALITY=${LLM_MODEL_QUALITY:-}

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
